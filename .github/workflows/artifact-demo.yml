name: artifact-demo

on: workflow dispatch

jobs:
   upload-artifacts-demo:
      runs-on: ubuntu-latest

      steps:
         - name: generate a log file 
           run: |
             echo " Build started ...." > report.txt
             echo " Running tests...." >> report.txt
             echo " All test passed..." >> report.txt

          - name: Upload artifact
            uses: actions/upload-artifact@v4
            with: 
              name: test-report
              path: report.txt

