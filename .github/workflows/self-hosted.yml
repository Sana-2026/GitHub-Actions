name: Self-Hosted Runner Demo

on:
  workflow_dispatch:

jobs:
  test-self-hosted:
    runs-on: [self-hosted, my-linux-runner]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print hostname
        run: hostname

      - name: Print working directory
        run: pwd

      - name: Create a file
        run: |
          echo "This file was created by GitHub Actions on a self-hosted runner." > self-hosted-proof.txt
          ls -l self-hosted-proof.txt

      - name: Verify file exists
        run: |
          if [ -f self-hosted-proof.txt ]; then
            echo "File exists"
          else
            echo "File not found"
            exit 1
          fi

